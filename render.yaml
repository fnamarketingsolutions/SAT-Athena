# Render Blueprint — Athena Python agents service
# Repo: https://github.com/fnamarketingsolutions/SAT-Athena
#
# Deploy: Render Dashboard → New → Blueprint → connect repo → branch main
# After deploy, set AGENT_SERVICE_URL in Vercel to the Render service URL.

services:
  - type: web
    name: athena-agents
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    dockerfilePath: ./agents/Dockerfile
    dockerContext: ./agents
    # Render sets PORT; Dockerfile CMD hardcodes 8080 — override here.
    dockerCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    autoDeploy: true
    buildFilter:
      paths:
        - agents/**
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Athena <noreply@yourdomain.com>
      - key: APP_URL
        sync: false
      - key: MICROLESSON_PROMPT_VARIANT
        value: c2-ir
      - key: MICROLESSON_TOOL_USE
        value: "1"
      - key: MICROLESSON_SELF_CRITIQUE
        value: "1"
      - key: MENTOR_TOOL_USE
        value: "1"
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: MAJORDOMO_ENABLED
        value: "0"
