# Studio deployment — separate from production
# Usage: docker compose -f docker-compose.studio.yml up -d
#
# Required env vars (set in shell or .env.studio):
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
#   NEXT_PUBLIC_SUPABASE_URL
#   ANTHROPIC_API_KEY
#   AGENT_SERVICE_URL (defaults to http://agents:8080)

services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_CLARITY_ID: ${NEXT_PUBLIC_CLARITY_ID:-}
        NEXT_PUBLIC_UMAMI_SRC: ${NEXT_PUBLIC_UMAMI_SRC:-}
        NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
    ports:
      - "${STUDIO_WEB_PORT:-3000}:3000"
    environment:
      # Runtime-only — must NOT be a build arg, never expose to the browser
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - AGENT_SERVICE_URL=http://agents:8080
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-}
    depends_on:
      - agents
    restart: unless-stopped

  agents:
    build: ./agents
    ports:
      - "${STUDIO_AGENTS_PORT:-8080}:8080"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
    restart: unless-stopped
